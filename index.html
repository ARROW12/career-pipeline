<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipeline | Career Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #080c14; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .profile-border { border-left: 4px solid #6366f1; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="p-6 border-b border-white/5 mb-12 glass sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="h-8 w-8 bg-indigo-600 rounded-lg flex items-center justify-center font-bold">P</div>
                <span class="text-xl font-bold tracking-tight uppercase">Pipeline <span class="text-indigo-400 text-xs">v3.0</span></span>
            </div>
            <div class="text-[10px] text-slate-500 font-mono text-right uppercase tracking-tighter">
                50+ Sources Integrated<br>
                <span class="text-emerald-400">Profile Matching Active</span>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6">
        <div class="glass p-6 rounded-2xl mb-10 profile-border flex flex-col md:flex-row justify-between items-center gap-6">
            <div>
                <h2 class="text-xl font-bold mb-1">Tejas Anand</h2>
                <p class="text-slate-400 text-sm">Manager, Data Engineer | AWS & AI Specialist</p>
            </div>
            <div class="flex gap-3">
                <a href="YOUR_LINKEDIN_URL" target="_blank" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg text-xs font-bold uppercase transition-all">LinkedIn</a>
                <a href="YOUR_RESUME_DOC_URL" target="_blank" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-xs font-bold uppercase transition-all">Resume</a>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12">
            <a href="https://www.linkedin.com/jobs/search/?f_WT=2&keywords=Data%20Engineer%20AWS%20Glue" target="_blank" class="glass p-4 rounded-xl text-center hover:border-indigo-500/50 transition-all">
                <span class="text-xs font-bold text-slate-500">LinkedIn</span>
            </a>
            <a href="https://wellfound.com/jobs?role=Data+Engineer" target="_blank" class="glass p-4 rounded-xl text-center hover:border-indigo-500/50 transition-all">
                <span class="text-xs font-bold text-slate-500">Wellfound</span>
            </a>
            <a href="https://www.indeed.com/jobs?q=Data+Engineer+Remote" target="_blank" class="glass p-4 rounded-xl text-center hover:border-indigo-500/50 transition-all">
                <span class="text-xs font-bold text-slate-500">Indeed</span>
            </a>
            <a href="https://remoteok.com/remote-data-engineer-jobs" target="_blank" class="glass p-4 rounded-xl text-center hover:border-indigo-500/50 transition-all">
                <span class="text-xs font-bold text-slate-500">Remote OK</span>
            </a>
        </div>

        <div id="feed" class="space-y-4">
            </div>
    </main>

    <script>
        // Use the same loadJobs() function with cacheBusting from previous steps
        async function loadJobs() {
            const USERNAME = 'ARROW12';
            const REPO = 'career-pipeline';
            try {
                const url = `https://raw.githubusercontent.com/${USERNAME}/${REPO}/main/jobs.json?t=${new Date().getTime()}`;
                const response = await fetch(url, { cache: "no-store" });
                const jobs = await response.json();
                
                document.getElementById('feed').innerHTML = jobs.map(job => `
                    <div class="glass p-6 rounded-2xl border-l-4 ${job.match > 70 ? 'border-indigo-500' : 'border-transparent'}">
                        <div class="flex justify-between items-start">
                            <div>
                                <span class="text-[10px] font-bold px-2 py-0.5 bg-indigo-500/10 text-indigo-400 rounded border border-indigo-500/20">${job.match}% MATCH</span>
                                <h3 class="text-xl font-bold mt-2">${job.title}</h3>
                                <p class="text-indigo-300 font-medium">${job.company}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-lg font-bold font-mono">${job.salary}</p>
                                <a href="${job.url}" target="_blank" class="inline-block mt-4 text-xs font-bold text-indigo-400">ANALYZE LEAD →</a>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                document.getElementById('feed').innerHTML = '<div class="text-center py-20 text-slate-500">Initializing Scaled Pipeline...</div>';
            }
        }
        loadJobs();
    </script>
</body>
</html>
