<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipeline | Career Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #080c14; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .profile-border { border-left: 4px solid #6366f1; }
        .job-card { animation: fadeIn 0.4s ease-out forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="p-6 border-b border-white/5 mb-12 glass sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="h-8 w-8 bg-indigo-600 rounded-lg flex items-center justify-center font-bold">P</div>
                <span class="text-xl font-bold tracking-tight uppercase tracking-widest">Pipeline <span class="text-indigo-400 text-xs">v4.0</span></span>
            </div>
            <div class="text-[10px] text-slate-500 font-mono text-right uppercase leading-tight">
                Graph Logic: AWS/Pharma<br>
                <span class="text-emerald-400">Reddit & Multi-Source Sync</span>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6">
        <div class="glass p-8 rounded-2xl mb-10 profile-border flex flex-col md:flex-row justify-between items-center gap-6">
            <div>
                <h2 class="text-2xl font-bold mb-1">Tejas Anand</h2>
                <p class="text-slate-400 text-sm">Manager, Data Engineer | AWS Infrastructure Specialist</p>
            </div>
            <div class="flex gap-4">
                <a href="https://www.linkedin.com/in/tejas-anand-b4489276" target="_blank" class="px-6 py-2.5 bg-[#0077b5] hover:bg-[#005582] rounded-lg text-xs font-bold uppercase transition-all flex items-center gap-2">
                    LinkedIn Profile
                </a>
                <a href="https://arrow12.github.io/portfolio" target="_blank" class="px-6 py-2.5 bg-slate-700 hover:bg-slate-600 rounded-lg text-xs font-bold uppercase transition-all">
                    Portfolio
                </a>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12">
            <a href="https://www.reddit.com/r/dataengineering/search/?q=hiring+remote&restrict_sr=1&sort=new" target="_blank" class="glass p-4 rounded-xl text-center hover:border-orange-500/50 transition-all group">
                <span class="text-xs font-bold text-slate-400 group-hover:text-orange-400">Reddit Hiring</span>
            </a>
            <a href="https://www.linkedin.com/jobs/search/?f_WT=2&keywords=Data%20Engineer%20Contract" target="_blank" class="glass p-4 rounded-xl text-center hover:border-indigo-500/50 transition-all group">
                <span class="text-xs font-bold text-slate-400 group-hover:text-white">LinkedIn Contract</span>
            </a>
            <a href="https://remoteok.com/remote-data-engineer-jobs" target="_blank" class="glass p-4 rounded-xl text-center hover:border-indigo-500/50 transition-all group">
                <span class="text-xs font-bold text-slate-400 group-hover:text-white">Remote OK</span>
            </a>
            <a href="https://wellfound.com/jobs?role=Data+Engineer" target="_blank" class="glass p-4 rounded-xl text-center hover:border-indigo-500/50 transition-all group">
                <span class="text-xs font-bold text-slate-400 group-hover:text-white">Wellfound</span>
            </a>
        </div>

        <h2 class="text-lg font-bold mb-6 flex items-center gap-2 text-slate-300">
            <span class="h-2 w-2 bg-emerald-500 rounded-full animate-pulse"></span>
            Ranked Recommendations (Contract & Remote)
        </h2>

        <div id="feed" class="space-y-4">
            <div class="text-center py-20 text-slate-600 font-mono text-xs uppercase tracking-widest">
                Running Graph Matching Algorithm...
            </div>
        </div>
    </main>

    <script>
        const USERNAME = 'ARROW12';
        const REPO = 'career-pipeline';

        async function loadJobs() {
            try {
                const url = `https://raw.githubusercontent.com/${USERNAME}/${REPO}/main/jobs.json?t=${new Date().getTime()}`;
                const response = await fetch(url, { cache: "no-store" });
                const jobs = await response.json();
                const container = document.getElementById('feed');
                
                if(!jobs || jobs.length === 0) {
                    container.innerHTML = '<div class="glass p-12 rounded-3xl text-center text-slate-500">Scanning Reddit and Global Boards... Check back in a few minutes.</div>';
                    return;
                }

                container.innerHTML = jobs.map((job, index) => `
                    <div class="glass p-6 rounded-2xl hover:border-indigo-500/50 transition-all job-card border-l-4 ${job.match > 60 ? 'border-indigo-500' : 'border-transparent'}" style="animation-delay: ${index * 0.05}s">
                        <div class="flex flex-col md:flex-row justify-between items-start gap-4">
                            <div class="flex-1">
                                <div class="flex items-center gap-3 mb-2">
                                    <span class="text-[10px] font-bold px-2 py-0.5 bg-indigo-500/10 text-indigo-400 rounded border border-indigo-500/20 uppercase tracking-tighter">
                                        Match Score: ${job.match}
                                    </span>
                                    <span class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">${job.loc}</span>
                                </div>
                                <h3 class="text-xl font-bold text-white mb-1 leading-tight">${job.title}</h3>
                                <p class="text-indigo-300 font-semibold text-sm mb-4">${job.company}</p>
                            </div>
                            <div class="text-right flex flex-col justify-between self-stretch">
                                <p class="text-xs text-slate-500 uppercase tracking-widest">${job.type || 'Direct'}</p>
                                <a href="${job.url}" target="_blank" class="mt-4 px-5 py-2 bg-indigo-600 hover:bg-indigo-500 rounded text-[10px] font-bold uppercase tracking-widest transition-all">
                                    Open Lead
                                </a>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                document.getElementById('feed').innerHTML = '<div class="text-center py-20 text-slate-600 uppercase text-xs">Pipeline Initializing...</div>';
            }
        }
        loadJobs();
    </script>
</body>
</html>
