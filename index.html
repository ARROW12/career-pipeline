<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipeline | Career Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        /* Smooth fade-in for job cards */
        .job-card { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="p-6 border-b border-white/5 mb-12 glass sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="h-8 w-8 bg-indigo-500 rounded-lg flex items-center justify-center font-bold text-white">P</div>
                <span class="text-xl font-bold tracking-tight">PIPELINE <span class="text-indigo-400 text-sm font-normal">v2.0</span></span>
            </div>
            <div class="flex flex-col items-end">
                <span class="text-[10px] text-slate-500 font-mono uppercase tracking-widest">Global Agent Active</span>
                <span class="text-[10px] text-indigo-400/70 font-mono">Sync Interval: 2 Hours</span>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6">
        <div class="mb-10">
            <h1 class="text-3xl font-bold mb-2">Market Intelligence</h1>
            <p class="text-slate-400">Automated sourcing for Cloud & Data Engineering roles matching your AWS stack.</p>
        </div>

        <div id="feed" class="space-y-4">
            <div class="text-center py-20">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-indigo-500 mb-4"></div>
                <p class="text-slate-500 font-mono text-sm">Intercepting job streams...</p>
            </div>
        </div>
    </main>

    <script>
        const USERNAME = 'ARROW12';
        const REPO = 'career-pipeline';

        async function loadJobs() {
            try {
                // Force GitHub to provide a fresh file by adding a unique timestamp to the URL
                const cacheBuster = `?t=${new Date().getTime()}`;
                const url = `https://raw.githubusercontent.com/${USERNAME}/${REPO}/main/jobs.json${cacheBuster}`;
                
                const response = await fetch(url, {
                    cache: "no-store" // Browser-level cache override
                });
                
                if (!response.ok) throw new Error('Source file not found');
                
                const jobs = await response.json();
                const container = document.getElementById('feed');
                
                if(!jobs || jobs.length === 0) {
                    container.innerHTML = `
                        <div class="glass p-12 rounded-3xl text-center">
                            <p class="text-slate-400 mb-2">The pipeline is currently initialized but empty.</p>
                            <p class="text-xs text-slate-500">Wait for the next GitHub Action cycle or trigger manually in the Actions tab.</p>
                        </div>`;
                    return;
                }

                container.innerHTML = jobs.map((job, index) => `
                    <div class="glass p-6 rounded-2xl hover:border-indigo-500/50 transition-all job-card" style="animation-delay: ${index * 0.1}s">
                        <div class="flex flex-col md:flex-row justify-between items-start gap-4">
                            <div class="flex-1">
                                <div class="flex items-center gap-3 mb-3">
                                    <span class="text-[10px] font-bold px-2 py-0.5 bg-indigo-500/10 text-indigo-400 rounded border border-indigo-500/20 uppercase tracking-tighter">
                                        ${job.match}% Stack Match
                                    </span>
                                    <span class="text-slate-500 text-xs font-medium flex items-center gap-1">
                                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                        ${job.location}
                                    </span>
                                </div>
                                <h3 class="text-xl font-bold text-white mb-1">${job.title}</h3>
                                <p class="text-indigo-300 font-semibold text-sm mb-4">${job.company}</p>
                                
                                <div class="flex flex-wrap gap-2">
                                    ${job.tags.map(tag => `
                                        <span class="text-[10px] bg-slate-800/50 px-2 py-1 rounded border border-white/5 text-slate-400 font-mono">
                                            ${tag}
                                        </span>
                                    `).join('')}
                                </div>
                            </div>
                            
                            <div class="flex flex-col items-end justify-between self-stretch min-w-[140px]">
                                <div class="text-right">
                                    <p class="text-lg font-bold text-emerald-400">${job.salary}</p>
                                    <p class="text-[10px] text-slate-500 uppercase tracking-widest mt-1">Estimated Pay</p>
                                </div>
                                <a href="${job.url}" target="_blank" class="w-full md:w-auto text-center mt-6 px-4 py-2 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-xs font-bold uppercase tracking-widest transition-colors">
                                    Apply Now
                                </a>
                            </div>
                        </div>
                        <div class="mt-6 pt-4 border-t border-white/5 flex justify-between items-center">
                            <span class="text-[10px] text-slate-600 font-mono italic">Source: Arbeitnow API</span>
                            <span class="text-[10px] text-slate-600 font-mono italic text-right">Synced: ${job.timestamp}</span>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Pipeline Error:", err);
                document.getElementById('feed').innerHTML = `
                    <div class="glass p-12 rounded-3xl text-center border-red-500/20">
                        <p class="text-red-400 font-mono text-sm">ERR_CONNECTION_REFUSED</p>
                        <p class="text-xs text-slate-500 mt-2">The agent is currently updating the data lake. Please refresh in 60 seconds.</p>
                    </div>`;
            }
        }

        // Initialize on load
        loadJobs();
    </script>
</body>
</html>
