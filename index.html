<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pipeline v6.0 | Global Career Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #020617; color: #f1f5f9; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .match-glow { border-left: 4px solid #6366f1; box-shadow: 0 0 30px rgba(99, 102, 241, 0.1); }
    </style>
</head>
<body class="min-h-screen pb-24">

    <nav class="p-6 border-b border-white/5 mb-12 glass sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="font-bold text-lg tracking-tighter">GLOBAL AGENT <span class="text-indigo-500 text-xs ml-1">v6.0</span></h1>
            <div class="flex gap-6 items-center">
                <a href="https://arrow12.github.io/portfolio" target="_blank" class="text-xs font-bold opacity-60 hover:opacity-100">Portfolio</a>
                <div class="h-1 w-1 bg-white/20 rounded-full"></div>
                <a href="https://www.linkedin.com/in/tejas-anand-b4489276" target="_blank" class="text-xs font-bold opacity-60 hover:opacity-100">LinkedIn</a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6">
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-16">
            <a href="https://www.reddit.com/r/dataengineering/search/?q=hiring+remote&restrict_sr=1&sort=new" target="_blank" class="glass p-6 rounded-3xl group border-b-4 border-orange-500">
                <p class="text-[10px] font-bold text-orange-400 uppercase mb-2">Priority 1</p>
                <h3 class="font-bold text-lg">Reddit Stream</h3>
                <p class="text-xs text-slate-500 mt-1">Peer-to-peer remote leads</p>
            </a>
            <a href="https://www.linkedin.com/jobs/search/?f_WT=2&keywords=Data%20Engineer%20Contract&location=India" target="_blank" class="glass p-6 rounded-3xl group border-b-4 border-indigo-500">
                <p class="text-[10px] font-bold text-indigo-400 uppercase mb-2">Domestic</p>
                <h3 class="font-bold text-lg">LinkedIn Contracts</h3>
                <p class="text-xs text-slate-500 mt-1">INR Remote / Freelance</p>
            </a>
            <a href="https://www.google.com/search?q=site:naukri.com+%22Data+Engineer%22+contract+remote" target="_blank" class="glass p-6 rounded-3xl group border-b-4 border-emerald-500">
                <p class="text-[10px] font-bold text-emerald-400 uppercase mb-2">Domestic</p>
                <h3 class="font-bold text-lg">Naukri Search</h3>
                <p class="text-xs text-slate-500 mt-1">Contract-only filters</p>
            </a>
            <a href="https://www.google.com/search?q=intitle:%22Data+Engineer%22+AWS+Remote+(contract+OR+freelance)" target="_blank" class="glass p-6 rounded-3xl group border-b-4 border-pink-500">
                <p class="text-[10px] font-bold text-pink-400 uppercase mb-2">Global</p>
                <h3 class="font-bold text-lg">Indeed/WorkAnywhere</h3>
                <p class="text-xs text-slate-500 mt-1">USD/EUR Direct-Hire</p>
            </a>
        </div>

        <div id="feed" class="space-y-6">
            <div class="text-center py-20 text-slate-500 font-mono text-xs animate-pulse">AGENT STATUS: SCOURING GLOBAL NETWORKS...</div>
        </div>
    </main>

    <script>
        async function loadJobs() {
            const container = document.getElementById('feed');
            try {
                const url = `https://raw.githubusercontent.com/ARROW12/career-pipeline/main/jobs.json?t=${new Date().getTime()}`;
                const response = await fetch(url);
                const jobs = await response.json();
                
                if(!jobs.length) {
                    container.innerHTML = '<div class="glass p-20 rounded-3xl text-center text-slate-500 font-mono text-xs uppercase tracking-widest">AI Judge: Scanning for AWS Stack matches... Check back shortly.</div>';
                    return;
                }

                container.innerHTML = jobs.map(job => `
                    <div class="glass p-8 rounded-[2.5rem] match-glow transition-all hover:bg-white/[0.02]">
                        <div class="flex flex-col md:flex-row justify-between items-start gap-8">
                            <div class="flex-1">
                                <div class="flex items-center gap-3 mb-4">
                                    <span class="text-[10px] font-bold px-3 py-1 bg-white/5 rounded-full border border-white/10 uppercase tracking-widest">${job.match}% AI FIT</span>
                                    <span class="text-[10px] font-bold ${job.type === 'USD/Global' ? 'text-emerald-400' : 'text-indigo-400'} uppercase tracking-widest">${job.type}</span>
                                </div>
                                <h3 class="text-3xl font-bold mb-2 tracking-tight">${job.title}</h3>
                                <p class="text-indigo-400 font-semibold mb-4">${job.company} — <span class="text-slate-500 font-normal italic">${job.loc}</span></p>
                                <p class="text-slate-400 text-sm leading-relaxed line-clamp-2">${job.desc || ''}</p>
                            </div>
                            <div class="flex flex-col items-end gap-4 min-w-[220px] self-stretch justify-between">
                                <a href="${job.url}" target="_blank" class="w-full text-center py-4 bg-indigo-600 hover:bg-indigo-500 rounded-2xl font-bold uppercase text-xs tracking-widest shadow-xl shadow-indigo-600/20 transition-all">Submit Resume</a>
                                <p class="text-[10px] text-slate-600 font-mono">Synced: ${job.timestamp}</p>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                container.innerHTML = '<div class="text-center py-20">Pipeline Offline. Verify GitHub Actions Write Permissions.</div>';
            }
        }
        loadJobs();
    </script>
</body>
</html>
