<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipeline | Career Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="p-6 border-b border-white/5 mb-12 glass sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="h-8 w-8 bg-indigo-500 rounded-lg flex items-center justify-center font-bold">P</div>
                <span class="text-xl font-bold tracking-tight">PIPELINE <span class="text-indigo-400 text-sm font-normal">v2.0</span></span>
            </div>
            <div class="flex gap-4 items-center">
                <button id="refreshBtn" onclick="triggerAction()" class="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-md text-sm font-semibold transition-all flex items-center gap-2">
                    <span id="btnText">Run Agent Sync</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6">
        <div id="statusMessage" class="hidden mb-6 p-4 rounded-lg bg-emerald-500/20 border border-emerald-500/50 text-emerald-400 text-sm font-semibold">
            Agent initialized. Pipeline is syncing... Please wait 60 seconds and refresh this page.
        </div>
        
        <div id="feed" class="space-y-4">
            <div class="text-center py-20 text-slate-400">Loading pipeline data...</div>
        </div>
    </main>

    <script>
        // --- CONFIGURATION ---
        const USERNAME = 'ARROW12'; 
        const REPO = 'career-pipeline';
        const TOKEN = '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'; // Treat this like a password

        async function loadJobs() {
            try {
                // Add a cache-busting query parameter so it always fetches the newest file
                const response = await fetch(`https://raw.githubusercontent.com/${USERNAME}/${REPO}/main/jobs.json?timestamp=${new Date().getTime()}`);
                const jobs = await response.json();
                
                if(jobs.length === 0) {
                    document.getElementById('feed').innerHTML = '<div class="text-center py-20 text-slate-400">No jobs match your stack today. Run the agent.</div>';
                    return;
                }

                document.getElementById('feed').innerHTML = jobs.map(job => `
                    <div class="glass p-6 rounded-2xl hover:border-indigo-500/50 transition-all">
                        <div class="flex justify-between items-start">
                            <div>
                                <div class="flex items-center gap-3 mb-2">
                                    <span class="text-xs font-bold px-2 py-1 bg-emerald-500/10 text-emerald-400 rounded border border-emerald-500/20">${job.match}% Stack Match</span>
                                    <span class="text-slate-500 text-sm">${job.location}</span>
                                </div>
                                <h3 class="text-xl font-bold">${job.title}</h3>
                                <p class="text-indigo-300 font-medium">${job.company}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-lg font-bold text-slate-100">${job.salary}</p>
                                <a href="${job.url}" target="_blank" class="inline-block mt-4 text-xs font-bold uppercase tracking-widest text-indigo-400 hover:text-indigo-300">View Payload →</a>
                            </div>
                        </div>
                        <div class="flex gap-2 mt-4">
                            ${job.tags.map(tag => `<span class="text-[10px] bg-white/5 px-2 py-1 rounded border border-white/10 text-slate-300">${tag}</span>`).join('')}
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
                document.getElementById('feed').innerHTML = '<div class="text-center py-20 text-red-400">Error loading data. Run the sync agent first.</div>';
            }
        }

        async function triggerAction() {
            const btn = document.getElementById('refreshBtn');
            const btnText = document.getElementById('btnText');
            const status = document.getElementById('statusMessage');

            btn.disabled = true;
            btn.classList.add('opacity-50');
            btnText.innerText = 'Syncing...';

            try {
                const response = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/dispatches`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify({ event_type: 'run_agent' })
                });

                if (response.ok) {
                    status.classList.remove('hidden');
                    btnText.innerText = 'Agent Deployed';
                } else {
                    alert('Failed to trigger. Check console and token permissions.');
                }
            } catch (err) {
                alert('Network error.');
            }
        }

        loadJobs();
    </script>
</body>
</html>
