<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Opportunities | Career Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #060910; color: #f8fafc; }
        .glass { background: rgba(13, 17, 28, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.03); }
        .match-high { border-left: 4px solid #10b981; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="p-6 border-b border-white/5 mb-12 glass sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="h-10 w-10 bg-indigo-600 rounded-xl flex items-center justify-center font-bold">T</div>
                <h1 class="font-bold text-lg">PIPELINE <span class="text-indigo-500 text-xs">v4.7.1</span></h1>
            </div>
            <div class="flex gap-4">
                <a href="https://www.linkedin.com/in/tejas-anand-b4489276" target="_blank" class="text-xs font-bold text-slate-400 hover:text-white">LinkedIn</a>
                <a href="https://arrow12.github.io/portfolio" target="_blank" class="text-xs font-bold text-slate-400 hover:text-white">Portfolio</a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-12">
            <a href="https://www.linkedin.com/jobs/search/?f_WT=2&keywords=Data%20Engineer%20Contract&location=India" target="_blank" class="glass p-6 rounded-3xl border-l-4 border-indigo-500 hover:bg-white/5 transition-all">
                <p class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest mb-2">Manual Source</p>
                <h3 class="font-bold">LinkedIn India Contracts</h3>
                <p class="text-xs text-slate-500 mt-1 italic">Remote-only filter active</p>
            </a>
            </div>

        <div id="feed" class="space-y-4">
            <p class="text-center py-20 text-slate-500 font-mono text-xs uppercase">Initializing secure job stream...</p>
        </div>
    </main>

    <script>
        const USERNAME = 'ARROW12';
        const REPO = 'career-pipeline';

        async function loadJobs() {
            try {
                const url = `https://raw.githubusercontent.com/${USERNAME}/${REPO}/main/jobs.json?t=${new Date().getTime()}`;
                const response = await fetch(url, { cache: "no-store" });
                const jobs = await response.json();
                const container = document.getElementById('feed');
                
                if(!jobs || jobs.length === 0) {
                    container.innerHTML = '<div class="glass p-20 rounded-3xl text-center text-slate-500 font-mono text-xs">FILTER ACTIVE: NO IRRELEVANT LEADS FOUND.</div>';
                    return;
                }

                container.innerHTML = jobs.map(job => `
                    <div class="glass p-6 rounded-3xl ${job.match >= 70 ? 'match-high' : ''}">
                        <div class="flex justify-between items-center">
                            <div>
                                <span class="text-[9px] font-bold px-2 py-1 bg-indigo-500/10 text-indigo-400 rounded border border-indigo-500/20 uppercase">${job.match}% FIT</span>
                                <h3 class="text-xl font-bold mt-2">${job.title}</h3>
                                <p class="text-indigo-400 text-sm">${job.company}</p>
                            </div>
                            <a href="${job.url}" target="_blank" class="px-6 py-3 bg-indigo-600 rounded-xl text-xs font-bold uppercase tracking-widest transition-all">Open Lead</a>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                document.getElementById('feed').innerHTML = '<div class="text-center py-20 text-slate-600 uppercase text-xs">Pipeline Empty. Run GitHub Action.</div>';
            }
        }
        loadJobs();
    </script>
</body>
</html>
