name: Career Pipeline Agent

on:
  schedule:
    - cron: '0 */2 * * *' # Runs every 2 hours
  workflow_dispatch: # Allows you to manually run it from the GitHub Actions tab

permissions:
  contents: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Execute Agent Script
        run: python agent.py

      - name: Commit and Push
        run: |
          git config --global user.name "Pipeline-Agent"
          git config --global user.email "action@github.com"
          git add jobs.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: Auto-update job pipeline" && git push)