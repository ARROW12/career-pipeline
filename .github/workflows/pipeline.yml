name: Global Career Agent

on:
  schedule:
    - cron: '0 */1 * * *' # Every 4 hours
  workflow_dispatch:

permissions:
  contents: write # CRITICAL: Allows the agent to save results to your repo

jobs:
  agent-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Execute Agent Logic
        run: python agent.py

      - name: Sync Pipeline Results
        run: |
          git config --global user.name "career-agent-bot"
          git config --global user.email "agent@github.com"
          git add jobs.json
          git commit -m "update: sync validated global opportunities" || echo "No new matches"
          git push
