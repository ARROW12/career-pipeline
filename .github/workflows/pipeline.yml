name: Career Agentic Sync

on:
  schedule:
    - cron: '0 */1 * * *' # Every 4 hours
  workflow_dispatch:

permissions:
  contents: write # REQUIRED to update jobs.json

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Run AI Agent
        run: |
          pip install requests
          python agent.py
      - name: Sync Results
        run: |
          git config --global user.name "Career-Agent"
          git config --global user.email "agent@github.com"
          git add jobs.json
          git commit -m "update: synced perfect global matches" || echo "No new matches"
          git push
